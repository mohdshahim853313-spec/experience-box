<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ExperienceBox</title>
    <script>
      (function() {
        try {
          var item = window.localStorage.getItem('expbox_theme');
          var theme = item ? JSON.parse(item) : 'system';
          if (theme === 'system') {
             theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'midnight' : 'minimal';
          }
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'minimal');
        }
      })();
    </script>
    <style>
      html[data-theme='midnight'], html[data-theme='midnight'] body {
        background-color: #000000;
        color: #f5f5f5;
      }
      html[data-theme='minimal'], html[data-theme='minimal'] body {
        background-color: #f5f6f7;
        color: #282829;
      }
      body {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
